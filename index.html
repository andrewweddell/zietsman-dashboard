<style>
  :root {

    --card: #ffffff;
    --muted: #f4f4f5;
    --muted-2: #fafafa;
    --muted-fg: #71717a;
    --border: #e4e4e7;
    --border-2: #d4d4d8;
    --primary: #18181b;
    --primary-fg: #fafafa;
    --sidebar: #fafafa;
    --sidebar-accent: #f1f1f3;
    --ring: #a1a1aa;
    --chart: #3f3f46;
    --chart-soft: #d4d4d8;
    --pos: #15803d; --pos-bg: #f0fdf4; --pos-bd: #bbf7d0;
    --warn: #b45309; --warn-bg: #fffbeb; --warn-bd: #fde68a;

  body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; letter-spacing: -.006em; }

  .org { margin-top: auto; padding: 8px; }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kpi { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--sh-xs); padding: 18px 18px 16px; display: flex; flex-direction: column; }

  .grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 18px; align-items: start; }

  /* tables */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .pill { display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 500; padding: 1px 8px; border-radius: 6px; border: 1px solid transparent; line-height: 17px; }
  .pill.ok { color: #3f3f46; background: var(--muted); border-color: var(--border); }

  .burn { display: flex; align-items: center; gap: 9px; min-width: 150px; }
  .burn .track { flex: 1; height: 6px; border-radius: 20px; background: var(--muted); overflow: hidden; }

  .pos-amt { color: var(--pos); font-weight: 550; } .neg-amt { color: var(--crit); font-weight: 550; }

  .stack { display: flex; height: 10px; border-radius: 20px; overflow: hidden; margin: 6px 0 14px; gap: 2px; }
  .stack span { height: 100%; border-radius: 3px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--muted-fg); }

  .alert { display: flex; gap: 11px; padding: 12px 13px; border-radius: 9px; border: 1px solid; align-items: flex-start; }
  .alert.crit { background: var(--crit-bg); border-color: var(--crit-bd); }
  .alert.warn { background: var(--warn-bg); border-color: var(--warn-bd); }
  .alert.ok { background: var(--pos-bg); border-color: var(--pos-bd); }

  .alert .t { font-weight: 600; font-size: 13px; }
  .alert.crit .t { color: var(--crit); } .alert.warn .t { color: var(--warn); } .alert.ok .t { color: var(--pos); }
  .alert .d { font-size: 12.5px; color: #52525b; margin-top: 2px; line-height: 1.45; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .select { font-family: inherit; font-size: 13px; border: 1px solid var(--border-2); background: var(--card); border-radius: 8px; padding: 0 11px; height: 34px; color: #3f3f46; cursor: pointer; box-shadow: var(--sh-xs); }
  .search { flex: 1; min-width: 180px; max-width: 280px; border: 1px solid var(--border-2); border-radius: 8px; padding: 0 11px; height: 34px; font-size: 13px; font-family: inherit; box-shadow: var(--sh-xs); }
  .search:focus, .select:focus { outline: 2px solid var(--ring); outline-offset: 1px; }

  .ai-banner { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--radius); background: var(--muted-2); border: 1px solid var(--border); align-items: flex-start; }
  .ai-banner .ico { width: 32px; height: 32px; border-radius: 8px; background: var(--primary); color: var(--primary-fg); display: grid; place-items: center; flex: none; }

  @media (max-width: 980px) {

    .sidebar { display: none; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }

</style>

function cashChart() {
  const W=760, H=230, padL=8, padR=8, padT=22, padB=26;
  const innerW = W-padL-padR, innerH = H-padT-padB;
  const vals = cash.map(c=>c.v);
  const vMax = Math.max(...vals, 0), vMin = Math.min(...vals, 0);
  const range = vMax - vMin || 1;
  const x = i => padL + i*(innerW/(cash.length-1));
  const y = v => padT + (vMax - v)/range*innerH;
  const zeroY = y(0);
  const line = cash.map((c,i)=>`${x(i).toFixed(1)},${y(c.v).toFixed(1)}`).join(" ");
  const area = `${padL},${zeroY.toFixed(1)} ` + line + ` ${(padL+innerW).toFixed(1)},${zeroY.toFixed(1)}`;
  const dots = cash.map((c,i)=>{const neg=c.v<0,last=i===cash.length-1;return `<circle cx="${x(i).toFixed(1)}" cy="${y(c.v).toFixed(1)}" r="${last?4.5:3}" fill="${neg?'var(--crit)':'var(--chart)'}" stroke="#fff" stroke-width="2"/>`;}).join("");
  const labels = cash.map((c,i)=>`<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted-fg)">${c.m}</text>`).join("");
  const valLabels = cash.map((c,i)=>{const neg=c.v<0,last=i===cash.length-1;if(!neg&&!last)return "";const yy=neg?y(c.v)+15:y(c.v)-9;return `<text x="${x(i).toFixed(1)}" y="${yy.toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="${neg?'var(--crit)':'var(--chart)'}">${(c.v<0?'-':'')}R${Math.abs(Math.round(c.v/1000))}k</text>`;}).join("");
  return `<div class="tbl-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Bank balance trend, dipping below zero in February">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--chart)" stop-opacity=".16"/><stop offset="1" stop-color="var(--chart)" stop-opacity="0"/></linearGradient></defs>
    <line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${padL+innerW}" y2="${zeroY.toFixed(1)}" stroke="var(--crit-bd)" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="${padL+2}" y="${(zeroY-5).toFixed(1)}" font-size="10" fill="#d18d86">R0</text>
    <polygon points="${area}" fill="url(#cg)"/>
    <polyline points="${line}" fill="none" stroke="var(--chart)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${valLabels}${labels}
  </svg></div>`;
}

function agedStack() {

  const seg = b => bk[b] ? `<span style="width:${(bk[b]/tot*100).toFixed(1)}%;background:${bkColor[b]}"></span>` : "";

  return `<div class="legend">${leg}</div><div class="stack">${seg(1)}${seg(2)}${seg(3)}${seg(4)}</div>`;
}

function projectDetail(code) {
  const p = projects.find(x=>x.code===code);
  const team = teams[code];
  const sumRates = team.reduce((a,n)=>a+rateOf(n),0);
  const hours = p.cost / sumRates; // sample timesheets: even split across the team
  const rows = team.map(n=>({n, role:roleOf(n), h:hours, r:rateOf(n), c:hours*rateOf(n)}));
  const inv = invoiced[code], paid = paidM[code], outstanding = inv - paid;

  // fee runway / break-even projection
  const start = pDMY(startDates[code]);
  const weeksElapsed = Math.max((TODAY - start)/(7*86400000), 0.2);
  const weeklyBurn = p.cost / weeksElapsed;
  const breakEvenWeeks = p.fee / weeklyBurn;
  const weeksToBE = breakEvenWeeks - weeksElapsed;
  const beDate = addDays(start, Math.round(breakEvenWeeks*7));
  const passed = weeksToBE < 0;
  const feeRemaining = p.fee - p.cost;
  const totalWeeks = Math.min(Math.max(weeksElapsed, breakEvenWeeks), weeksElapsed*5) * 1.08;
  const runwaySVG = (() => {
    const W=760,H=176,padL=8,padR=8,padT=14,padB=22, iw=W-padL-padR, ih=H-padT-padB;
    const endR = weeklyBurn*totalWeeks;
    const yMax = Math.max(p.fee, endR)*1.06;
    const xOf = w => padL + (w/totalWeeks)*iw;
    const yOf = r => padT + (1 - r/yMax)*ih;
    const todayW = Math.min(weeksElapsed, totalWeeks);
    const feeY = yOf(p.fee);
    const beIn = breakEvenWeeks <= totalWeeks;
    const beX = xOf(breakEvenWeeks);
    const todayX = xOf(todayW);
    return `<div class="tbl-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cumulative cost projected against fee">
      <line x1="${padL}" y1="${feeY.toFixed(1)}" x2="${padL+iw}" y2="${feeY.toFixed(1)}" stroke="var(--foreground)" stroke-width="1" stroke-dasharray="5 4"/>
      <text x="${padL+iw-2}" y="${(feeY-6).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--muted-fg)">Fee ${ZAR(p.fee)}</text>
      <line x1="${todayX.toFixed(1)}" y1="${padT}" x2="${todayX.toFixed(1)}" y2="${padT+ih}" stroke="var(--border-2)" stroke-width="1"/>
      <text x="${todayX.toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="10" fill="var(--muted-fg)">Today</text>
      <text x="${padL}" y="${H-7}" text-anchor="start" font-size="10" fill="var(--muted-fg)">${fDMY(start).slice(0,5)}</text>
      <polyline points="${xOf(0)},${yOf(0).toFixed(1)} ${todayX.toFixed(1)},${yOf(p.cost).toFixed(1)}" fill="none" stroke="${burnColor(p.burn)}" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="${todayX.toFixed(1)},${yOf(p.cost).toFixed(1)} ${xOf(totalWeeks).toFixed(1)},${yOf(endR).toFixed(1)}" fill="none" stroke="${burnColor(p.burn)}" stroke-width="2" stroke-dasharray="5 4" opacity=".6"/>
      ${beIn ? `<line x1="${beX.toFixed(1)}" y1="${feeY.toFixed(1)}" x2="${beX.toFixed(1)}" y2="${padT+ih}" stroke="var(--crit)" stroke-width="1" stroke-dasharray="2 3"/>
      <circle cx="${beX.toFixed(1)}" cy="${feeY.toFixed(1)}" r="4.5" fill="var(--crit)" stroke="#fff" stroke-width="2"/>
      <text x="${beX.toFixed(1)}" y="${(padT+ih+14).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--crit)">Break-even ${fDMY(beDate).slice(0,5)}</text>` : `<text x="${(padL+iw).toFixed(1)}" y="${(padT+12).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--muted-fg)">Break-even beyond ${Math.round(totalWeeks)}w</text>`}
    </svg></div>`;
  })();
  const runwayStat = (lab,val,cls="") => `<div style="min-width:150px"><div style="font-size:12px;color:var(--muted-fg)">${lab}</div><div class="num ${cls}" style="font-size:21px;font-weight:600;letter-spacing:-.02em;margin-top:2px">${val}</div></div>`;
  const runwayHtml = `<div class="card">
    <div class="card-h"><h2>Fee runway</h2><span class="meta">projection at current burn rate</span></div>
    <div class="card-b">
      <div style="display:flex;gap:32px;flex-wrap:wrap;margin-bottom:14px">
        ${runwayStat("Weekly burn", ZAR(weeklyBurn)+"/wk")}
        ${runwayStat("Fee remaining", (feeRemaining<0?'-':'')+ZAR(Math.abs(feeRemaining)), feeRemaining<0?'neg-amt':'')}
        ${runwayStat("Runway left", passed ? Math.abs(weeksToBE).toFixed(0)+" wks over" : "~"+weeksToBE.toFixed(0)+" weeks", passed?'neg-amt':'')}
        ${runwayStat("Break-even date", fDMY(beDate), passed?'neg-amt':'')}
      </div>
      ${runwaySVG}
      <p class="muted" style="font-size:12px;margin:12px 0 0">${passed
        ? `Cost passed the fee around <strong style="color:var(--crit)">${fDMY(beDate)}</strong>. Every hour logged since has been at a loss (currently ${ZAR(Math.abs(feeRemaining))} under).`
        : `At the current burn of ${ZAR(weeklyBurn)}/week, the fee is exhausted around <strong>${fDMY(beDate)}</strong> (about ${weeksToBE.toFixed(0)} weeks of team time left). Past this, the project loses money.`}</p>
    </div>
  </div>`;
  const bar = (v,max,col) => `<div style="flex:1;height:8px;border-radius:20px;background:var(--muted);overflow:hidden"><div style="height:100%;width:${Math.min(v/max*100,100)}%;background:${col};border-radius:20px"></div></div>`;
  const billRow = (lab,v,col) => `<div style="display:flex;align-items:center;gap:12px"><div style="width:140px;font-size:13px;color:var(--muted-fg)">${lab}</div>${bar(v,p.fee,col)}<div class="mono" style="width:110px;text-align:right;font-weight:550">${ZAR(v)}</div></div>`;
  const stat = (lab,val,formula,cls="") => `<div class="kpi"><div class="desc">${lab}</div><div class="val num ${cls}">${val}</div><div class="foot"><div class="sub mono" style="font-size:11px">${formula}</div></div></div>`;
  return `
  <div style="display:flex;align-items:center;gap:12px">
    <button class="btn ghost" data-back="projects"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Projects</button>
    <div>
      <div style="font-size:19px;font-weight:600;letter-spacing:-.02em">${p.name}</div>
      <div class="proj-code mono" style="font-size:12.5px">${p.code} · ${p.client}</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">${typeTag(p.type)} <span class="muted" style="font-size:13px">Lead: ${lead(p.pm)}</span> ${statusPill(p.status)}</div>
  </div>
  <div class="kpis">
    ${stat("Fee estimate", ZAR(p.fee), "Agreed fee · from Fresh Projects")}
    ${stat("Cost to date", ZAR(p.cost), "Σ (hours × cost rate)")}
    ${stat("Margin", (p.margin<0?'-':'')+ZAR(Math.abs(p.margin)), "fee − cost to date", p.margin<0?'neg-amt':'pos-amt')}
    ${stat("Fee burn", p.burn.toFixed(0)+"%", "cost to date ÷ fee", p.burn>100?'neg-amt':'')}
  </div>
  ${runwayHtml}
  <div class="grid-2">
    <div class="card">
      <div class="card-h"><h2>Cost to date breakdown</h2><span class="meta">${ZAR(p.cost)}</span></div>
      <div class="card-b" style="padding-top:8px"><div class="tbl-wrap"><table>
        <thead><tr><th>Employee</th><th>Role</th><th class="r">Hours</th><th class="r">Cost rate</th><th class="r">Costed</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td style="font-weight:550">${lead(r.n)}</td><td class="muted">${r.role}</td>
          <td class="r mono">${r.h.toFixed(0)}</td><td class="r mono">${ZAR(r.r)}/h</td>
          <td class="r mono" style="font-weight:550">${ZAR(r.c)}</td>
        </tr>`).join("")}
        <tr style="border-top:2px solid var(--border)"><td colspan="2" style="font-weight:600">Cost to date</td>
          <td class="r mono" style="font-weight:600">${rows.reduce((a,r)=>a+r.h,0).toFixed(0)}</td><td></td>
          <td class="r mono" style="font-weight:600">${ZAR(p.cost)}</td></tr>
        </tbody></table></div>
        <p class="muted" style="font-size:12px;margin:12px 0 0">Hours come from Fresh Projects timesheets; cost rate from Staff &amp; Rates. The product of the two, summed across the team, is the cost to date.</p>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h2>Billing &amp; payment</h2><span class="meta">Fresh vs Xero</span></div>
      <div class="card-b" style="display:flex;flex-direction:column;gap:13px;padding-top:16px">
        ${billRow("Fee estimate", p.fee, "var(--border-2)")}
        ${billRow("Invoiced (Fresh)", inv, "var(--chart-soft)")}
        ${billRow("Paid (Xero)", paid, "var(--pos)")}
        ${billRow("Cost to date", p.cost, burnColor(p.burn))}
        <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;justify-content:space-between;font-size:13px">
          <span class="muted">Outstanding (invoiced, not yet paid)</span><span class="mono" style="font-weight:600">${ZAR(outstanding)}</span>
        </div>
        ${code==="AP-2405" ? `<div class="alert crit"><svg class="ai" viewBox="0 0 24 24" fill="none" stroke="var(--crit)" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 2.4 18a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div><div class="t">Over budget &amp; under-billed</div><div class="d">Cost (${ZAR(p.cost)}) now exceeds the fee (${ZAR(p.fee)}). One Fresh invoice (FP-1012, ${ZAR(165600)}) is also missing from Xero.</div></div></div>` : ``}
        ${code==="AP-2403" ? `<div class="alert warn"><svg class="ai" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 2.4 18a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div><div class="t">Invoice amount mismatch</div><div class="d">FP-1006 is ${ZAR(586500)} in Fresh but ${ZAR(580750)} in Xero, off by ${ZAR(5750)}.</div></div></div>` : ``}
      </div>
    </div>
  </div>`;
}

const titles = {dashboard:"Dashboard", projects:"Project Profitability", invoices:"Overdue Invoices", cash:"Cash Flow", recon:"Reconciliation", explore:"Explore", staff:"Staff & Rates"};

function show(page) {
  document.getElementById("content").innerHTML = PAGES[page]();
  document.getElementById("crumbCur").textContent = titles[page];
  document.querySelectorAll(".nav-item").forEach(b => b.classList.toggle("active", b.dataset.page===page));
  window.scrollTo(0,0);
}
function showDetail(code) {
  const p = projects.find(x=>x.code===code); if(!p) return;
  document.getElementById("content").innerHTML = projectDetail(code);
  document.getElementById("crumbCur").textContent = p.name;
  document.querySelectorAll(".nav-item").forEach(b => b.classList.toggle("active", b.dataset.page==="projects"));
  window.scrollTo(0,0);
}
document.getElementById("nav").addEventListener("click", e => { const b = e.target.closest(".nav-item"); if (b) show(b.dataset.page); });
document.getElementById("content").addEventListener("click", e => {
  const back = e.target.closest("[data-back]"); if (back) { show(back.dataset.back); return; }
  const row = e.target.closest("tr[data-code]"); if (row) showDetail(row.dataset.code);
});
show("dashboard");
</script>
